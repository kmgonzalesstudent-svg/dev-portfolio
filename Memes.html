<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Soundboard Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .soundboard-container {
            max-width: 800px;
            margin: 50px auto;
        }
        .sound-button {
            height: 100px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .sound-button:hover {
            transform: scale(1.05);
        }
        .sound-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Meme Soundboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container soundboard-container">
        <h1 class="text-center mb-4">Meme Soundboard</h1>
        <p class="text-center text-muted mb-4">Click the buttons to play hilarious meme sounds! Built as a fun hobby project with Bootstrap for responsive UI/UX.</p>
        
        <div class="text-center mb-4">
            <button class="btn btn-danger" onclick="stopAllSounds()">Stop All Sounds</button>
        </div>
        
        <div class="row g-3">
            <div class="col-6 col-md-4">
                <button class="btn btn-primary w-100 sound-button" onclick="playSound('doh')">D'oh! (Simpsons)</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-success w-100 sound-button" onclick="playSound('airhorn')">Airhorn</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-warning w-100 sound-button" onclick="playSound('troll')">Trollolol</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-danger w-100 sound-button" onclick="playSound('robloxoof')">Roblox Oof</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-info w-100 sound-button" onclick="playSound('rickroll')">Rick Roll</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-secondary w-100 sound-button" onclick="playSound('sad')">Sad Trombone</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-primary w-100 sound-button" onclick="playSound('smoke')">Smoke Detector Beep</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-success w-100 sound-button" onclick="playSound('fahhh')">FAAHHHHHHH</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-warning w-100 sound-button" onclick="playSound('bruh')">Bruh</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-danger w-100 sound-button" onclick="playSound('vine')">Vine Boom</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-info w-100 sound-button" onclick="playSound('what')">What the Hell</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-secondary w-100 sound-button" onclick="playSound('yeet')">Yeet</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-primary w-100 sound-button" onclick="playSound('ewbrother')">Ew Brother Ew What's That Brother</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-success w-100 sound-button" onclick="playSound('baldslap')">Bald Head Slap</button>
            </div>
            <div class="col-6 col-md-4">
                <button class="btn btn-warning w-100 sound-button" onclick="playSound('dogdoin')">What The Dog Doin'</button>
            </div>
        </div>
    </div>

    <!-- Audio elements -->
    <audio id="doh" src="https://www.myinstants.com/media/sounds/doh.mp3"></audio>
    <audio id="airhorn" src="https://www.myinstants.com/media/sounds/mlg-airhorn.mp3"></audio>
    <audio id="troll" src="https://www.myinstants.com/media/sounds/trollolol.mp3"></audio>
    <audio id="robloxoof" src="https://www.myinstants.com/media/sounds/roblox-death-sound_1.mp3"></audio>
    <audio id="rickroll" src="https://www.myinstants.com/media/sounds/rickroll.mp3"></audio>
    <audio id="sad" src="https://www.myinstants.com/media/sounds/sad-trombone.mp3"></audio>
    <audio id="smoke" src="https://www.myinstants.com/media/sounds/smoke-detector-beep.mp3"></audio>
    <audio id="fahhh" src="https://www.myinstants.com/media/sounds/fahhh_KcgAXfs.mp3"></audio>
    <audio id="bruh" src="https://www.myinstants.com/media/sounds/bruh.mp3"></audio>
    <audio id="vine" src="https://www.myinstants.com/media/sounds/vine-boom.mp3"></audio>
    <audio id="what" src="https://www.myinstants.com/media/sounds/what-the-hell.mp3"></audio>
    <audio id="yeet" src="https://www.myinstants.com/media/sounds/yeet.mp3"></audio>
    <audio id="ewbrother" src="https://www.myinstants.com/media/sounds/ew-brother-ew-whats-that-brother-meme.mp3"></audio>
    <audio id="baldslap" src="https://www.myinstants.com/media/sounds/slap-ahh.mp3"></audio>
    <audio id="dogdoin" src="https://www.myinstants.com/media/sounds/what-the-dog-doing-vine.mp3"></audio>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const audios = document.querySelectorAll('audio');

        function playSound(soundId) {
            const audio = document.getElementById(soundId);
            audio.currentTime = 0; // Reset to start
            audio.play();
        }

        function stopAllSounds() {
            audios.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }
    </script>
</body>
</html>
